<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highway Racer</title>
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="./manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
    }
    #game-container { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45); }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('./service-worker.js')
          .catch((err) => console.warn('[PWA] SW registration failed:', err));
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="src/config.js"></script>
  <script src="src/AudioManager.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MainMenuScene.js"></script>
  <script src="src/scenes/SettingsScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
